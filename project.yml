name: Lucius
options:
  bundleIdPrefix: com.lucius
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  Lucius:
    type: application
    platform: iOS
    sources:
      - Lucius
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lucius.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: Lucius
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: Lucius saves generated scene images to your photo library only when you tap Save.

  LuciusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - LuciusTests
    dependencies:
      - target: Lucius
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lucius.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true

schemes:
  Lucius:
    build:
      targets:
        Lucius: all
        LuciusTests: [test]
    test:
      targets:
        - LuciusTests
      gatherCoverageData: true
